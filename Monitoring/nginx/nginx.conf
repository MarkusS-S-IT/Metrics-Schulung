worker_processes  1;

events {
    worker_connections  1024;
}

error_log         /data/logs/error.log info;


http {
    server_tokens off;
    include       mime.types;
    charset       utf-8;

    access_log    /data/logs/access.log  combined;

    # Grafana
    server {
        listen 80;
        server_name grafana-whtc.sdi.tbintra.net;
        ssl_certificate     /etc/nginx/certs/grafana.crt;
        ssl_certificate_key /etc/nginx/certs/grafana.key;

        location / {
            proxy_pass http://grafana:3000;

            # websocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # reverse-proxy headers
            proxy_set_header Host               $host;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host   $host;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }
    }
}
