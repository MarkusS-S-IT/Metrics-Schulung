name: monitoring

services:
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.114.0
    container_name: victoriametrics
    volumes:
      - ./victoriametrics/victoriametrics.yml:/victoria-metrics-data/victoriametrics.yml
      - victoriametrics_data:/victoria-metrics-data
    ports:
      - "9092:8428"
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--promscrape.config=/victoria-metrics-data/victoriametrics.yml"
      - "--selfScrapeInterval=15s"
    deploy:
      resources:
        reservations:
          cpus: "0.25"
          memory: "512MB"
        limits:
          cpus: "1"
          memory: "4GB"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:12.0.2
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - "GF_AUTH_ANONYMOUS_ENABLED=true"
      - "GF_AUTH_ANONYMOUS_ORG_NAME=Main Org."
      - "GF_AUTH_ANONYMOUS_ORG_ROLE=Admin"
      - "GF_AUTH_DISABLE_LOGIN_FORM=true"
      - "GF_INSTALL_PLUGINS=victoriametrics-metrics-datasource"
    depends_on:
      - victoriametrics
    deploy:
      resources:
        reservations:
          cpus: "0.25"
          memory: "512MB"
        limits:
          cpus: "1"
          memory: "2GB"
    restart: unless-stopped

volumes:
  victoriametrics_data:
  grafana_data:
